<!DOCTYPE html>
<html>
<head>
    <title>Search Result</title>
</head>
<body>

<h1>Search Result</h1>

{% for message in get_flashed_messages() %}
    <p>{{ message }}</p>
{% endfor %}

<h2>Search Result</h2>

{% if student %}
    <p>ID: {{ student[0] }}</p>
    <p>Name: {{ student[1] }}</p>
{% else %}
    <p>No student found.<p>
{% endif %}

<a herf ="/">Back</a>

</body>
</html>
